name: CI

# Continuous Integration: on every push and pull request, type-check, run the
# test suite, and confirm the production build succeeds. Deployment is handled
# separately by Vercel (this is the standard "CI on GitHub, CD on the host" split).

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
